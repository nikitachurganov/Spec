<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spec Generator</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: Inter, Arial, sans-serif;
        font-size: 13px;
        color: #1c1f23;
        background: #fff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
        font-weight: 600;
      }

      .card {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fafafa;
        padding: 12px;
        margin-bottom: 12px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 600;
      }

      .checkbox-row {
        display: flex;
        gap: 8px;
        align-items: center;
        min-height: 28px;
        cursor: pointer;
      }

      .checkbox-row span {
        user-select: none;
      }

      button {
        height: 32px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid rgba(28, 31, 35, 0.15);
        background: #f3f4f6;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .primary {
        background: #137ff4;
        color: #fff;
        border-color: #137ff4;
      }

      .error {
        display: none;
        border: 1px solid rgba(220, 38, 38, 0.28);
        background: rgba(220, 38, 38, 0.08);
        color: #7f1d1d;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 12px;
      }

      .error.show {
        display: block;
      }

      .status {
        margin-top: 8px;
        font-size: 12px;
        color: rgba(28, 31, 35, 0.75);
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Spec Generator</h1>

    <div id="error" class="error"></div>

    <div class="card">
      <h2>Блоки спецификации</h2>

      <label class="checkbox-row">
        <input type="checkbox" id="sectionContainers" checked />
        <span>Контейнеры</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="sectionAnatomy" checked />
        <span>Анатомия</span>
      </label>
    </div>

    <div class="card">
      <h2>Preview overlays</h2>

      <label class="checkbox-row">
        <input type="checkbox" id="showChildOverlays" checked />
        <span>Overlay вложенных элементов</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="showGapOverlays" checked />
        <span>Overlay gap</span>
      </label>
    </div>

    <button id="generateButton" type="button" class="primary">
      Собрать спецификацию
    </button>

    <div id="status" class="status"></div>

    <script>
      (function () {
        'use strict';

        var errorEl = document.getElementById('error');
        var generateButton = document.getElementById('generateButton');
        var statusEl = document.getElementById('status');

        function getSectionSettings() {
          return {
            containers: document.getElementById('sectionContainers')
              ? document.getElementById('sectionContainers').checked
              : true,

            anatomy: document.getElementById('sectionAnatomy')
              ? document.getElementById('sectionAnatomy').checked
              : true,

            childOverlays: document.getElementById('showChildOverlays')
              ? document.getElementById('showChildOverlays').checked
              : true,

            gapOverlays: document.getElementById('showGapOverlays')
              ? document.getElementById('showGapOverlays').checked
              : true,
          };
        }

        function showError(text) {
          errorEl.textContent = text || '';
          errorEl.classList.add('show');
        }

        function hideError() {
          errorEl.textContent = '';
          errorEl.classList.remove('show');
        }

        function showStatus(text) {
          statusEl.textContent = text || '';
        }

        function setGenerating(isGenerating) {
          generateButton.disabled = isGenerating;
          generateButton.textContent = isGenerating
            ? 'Собираю спецификацию...'
            : 'Собрать спецификацию';
        }

        window.addEventListener('message', function (event) {
          var wrapped = event && event.data;
          var msg = wrapped && wrapped.pluginMessage;
          if (!msg || typeof msg.type !== 'string') return;

          if (msg.type === 'SPECIFICATION_BUILT') {
            hideError();
            var builtName =
              msg.payload && msg.payload.name ? msg.payload.name : '';
            showStatus(
              builtName
                ? 'Спецификация собрана: ' + builtName
                : 'Спецификация собрана'
            );
            setGenerating(false);
            return;
          }

          if (msg.type === 'ERROR') {
            showError(
              msg.payload && msg.payload.message
                ? msg.payload.message
                : 'Неизвестная ошибка.'
            );
            setGenerating(false);
            return;
          }
        });

        generateButton.addEventListener('click', function () {
          hideError();
          showStatus('');
          setGenerating(true);
          parent.postMessage(
            {
              pluginMessage: {
                type: 'BUILD_SPECIFICATION',
                payload: {
                  sections: getSectionSettings(),
                },
              },
            },
            '*'
          );
        });
      })();
    </script>
  </body>
</html>
