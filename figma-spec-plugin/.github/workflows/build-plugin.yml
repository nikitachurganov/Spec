name: Build Figma Plugin

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir figma-plugin-build
          cp manifest.json figma-plugin-build/manifest.json
          cp -r dist figma-plugin-build/dist
          if [ -f README.md ]; then cp README.md figma-plugin-build/README.md; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: figma-plugin-build
          path: figma-plugin-build
          retention-days: 30
